<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano 21 Dias</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

.container {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 50px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    opacity: 0.9;
}

.whats {
    background: #25d366;
}

.result {
    margin-top: 20px;
    display: none;
    background: #e9ffe9;
    padding: 15px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Descubra quanto pode emagrecer em 21 dias</h2>

<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" id="altura" placeholder="Altura (ex: 1.65)">

<button onclick="calcular()">Calcular agora</button>

<div class="result" id="resultado"></div>

</div>

<script>
function calcular() {
    let peso = document.getElementById("peso").value;
    let altura = document.getElementById("altura").value;

    if (!peso || !altura) {
        alert("Preencha todos os dados");
        return;
    }

    let perda = (peso * 0.04).toFixed(1);

    document.getElementById("resultado").style.display = "block";
    document.getElementById("resultado").innerHTML = `
        <h3>Resultado:</h3>
        <p>Você pode perder até <b>${perda} kg em 21 dias</b></p>
        <p>Plano simples, sem academia e fácil de seguir.</p>

        <button onclick="comprar()">💰 Quero meu plano completo</button>
        <button class="whats" onclick="whatsapp()">📲 Falar no WhatsApp</button>
    `;
}

function comprar() {
    window.location.href = "https://mpago.la/1XZw8Z5";
}

function whatsapp() {
    let mensagem = "Oi, fiz o cálculo no site e quero o plano de 21 dias";
    let url = "https://wa.me/5594991461505?text=" + encodeURIComponent(mensagem);
    window.location.href = url;
}
</script>

</body>
</html>
